project_id = "kotobase"

# We hand-write the API and this is a Postgres-focused project, so we run only
# Postgres + Studio and disable the rest. Flip any `enabled` back to true to
# restore a service. Full reference:
# https://supabase.com/docs/guides/local-development/cli/config

[api]
enabled = true          # kept only because Studio reaches the DB through this gateway
port = 54321

[db]
port = 54322
shadow_port = 54320     # used by `supabase db diff`
major_version = 17

[db.migrations]
enabled = true

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = false
[storage]
enabled = false
[realtime]
enabled = false
[edge_runtime]
enabled = false
[inbucket]
enabled = false
[analytics]
enabled = false
